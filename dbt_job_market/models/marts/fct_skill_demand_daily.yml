version: 2

models:
  - name: fct_skill_demand_daily
    description: "Daily observed skill demand by extraction date, country, role, and skill. Missing dates mean the batch pipeline was not run, not zero demand."
    columns:
      - name: skill_demand_daily_id
        description: "Deterministic identifier for the daily skill demand grain."
        tests:
          - not_null
          - unique

      - name: source
        description: "Source system for the job posting observations."
        tests:
          - not_null

      - name: extract_date
        description: "Date when the batch pipeline observed the postings."
        tests:
          - not_null

      - name: search_country
        description: "Country code used in the search request."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - de
                  - gb

      - name: search_role
        description: "Role keyword group used in the search request."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - data_engineer
                  - analytics_engineer
                  - ai_engineer

      - name: skill
        description: "Matched normalized skill name."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('skill_dictionary')
                field: skill

      - name: category
        description: "Skill category from the controlled dictionary."
        tests:
          - not_null

      - name: posting_count
        description: "Number of distinct source job postings matching the skill for this date, country, and role. This keeps the raw source job_id grain."
        tests:
          - not_null

      - name: deduped_posting_group_count
        description: "Number of distinct analytical posting groups matching the skill for this date, country, and role. This reduces inflation from multi-location source postings."
        tests:
          - not_null