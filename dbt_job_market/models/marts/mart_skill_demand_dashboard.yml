version: 2

models:
  - name: mart_skill_demand_dashboard
    description: "Deduplicated skill demand mart prepared for dashboard use. Metrics are based on analytical posting groups rather than raw source job IDs."
    columns:
      - name: skill_demand_dashboard_id
        description: "Deterministic identifier for the dashboard skill demand grain."
        tests:
          - not_null
          - unique

      - name: source
        description: "Source system for the job posting observations."
        tests:
          - not_null

      - name: search_country
        description: "Country code used in the search request."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - de
                  - gb

      - name: search_role
        description: "Role keyword group used in the search request."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - data_engineer
                  - analytics_engineer
                  - ai_engineer

      - name: skill
        description: "Matched normalized skill name."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('skill_dictionary')
                field: skill

      - name: category
        description: "Skill category from the controlled dictionary."
        tests:
          - not_null

      - name: total_skill_mentions
        description: "Total number of deduplicated analytical posting groups with this skill across run days for the country and role."
        tests:
          - not_null

      - name: active_run_days
        description: "Number of extraction dates where this country, role, and skill combination was observed."
        tests:
          - not_null

      - name: avg_skill_mentions_per_run
        description: "Average number of deduplicated analytical posting groups with this skill per active run day."
        tests:
          - not_null

      - name: latest_extract_date
        description: "Most recent extraction date where this country, role, and skill combination was observed."
        tests:
          - not_null